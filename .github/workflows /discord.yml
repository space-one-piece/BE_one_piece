name: Discord Notification

on:
  push:
    branches: [ "main", "develop" ] # 원하는 브랜치 지정
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  discord-notify:
    runs-on: ubuntu-latest
    if: success() # 성공했을 때만 실행
    steps:
      - name: Send Discord Notification
        shell: bash
        run: |
          # 1. 정보 추출
          EVENT_NAME="${{ github.event_name }}"
          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            TITLE="🚀 새로운 PR이 생성되었습니다"
            CONTENT="${{ github.event.pull_request.title }}"
            URL="${{ github.event.pull_request.html_url }}"
            # PR이 병합되었는지 확인
            if [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
              TITLE="💜 PR이 성공적으로 병합되었습니다"
            fi
          else
            TITLE="✅ 새로운 PUSH가 발생했습니다"
            CONTENT="${{ github.event.head_commit.message }}"
            URL="${{ github.event.head_commit.url }}"
          fi

          # 2. JSON 바디 생성 (jq를 사용하여 안전하게 생성)
          # 커밋 메시지나 제목에 따옴표가 있어도 에러가 나지 않도록 처리합니다.
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg content "$CONTENT" \
            --arg actor "$ACTOR" \
            --arg repo "$REPO" \
            --arg url "$URL" \
            '{
              embeds: [{
                title: $title,
                description: ("**작성자:** " + $actor + "\n**내용:** " + $content + "\n**저장소:** " + $repo),
                url: $url,
                color: 3447003
              }]
            }')

          # 3. 디스코드 전송
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
