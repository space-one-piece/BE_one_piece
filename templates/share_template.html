<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #E5E5E5; /* 캡처 시 배경 구분을 위해 톤다운 */
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 600px;
            background: white;
            border-radius: 40px;
            padding: 60px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            box-sizing: border-box;
        }

        .top-sub { font-size: 14px; letter-spacing: 3px; color: #AAA; margin-bottom: 8px; font-weight: 300; }
        .top-main { font-size: 16px; color: #888; margin-bottom: 40px; }

        .visual-area {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto 50px;
            display: flex; justify-content: center; align-items: center;
        }

        .axis { position: absolute; background: #DDD; }
        .axis-h { width: 100%; height: 1px; top: 50%; left: 0; }
        .axis-v { width: 1px; height: 100%; left: 50%; top: 0; }

        .axis-label { position: absolute; font-size: 11px; color: #AAA; background: white; padding: 0 8px; z-index: 2; }
        .label-top { top: -10px; }
        .label-bottom { bottom: -10px; }
        .label-left { left: -30px; }
        .label-right { right: -30px; }

        .scent-blur {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            /* 백엔드에서 전달받은 그라디언트 색상 적용 */
            filter: blur(45px);
            z-index: 1;
            opacity: 0.8;
        }

        /* 텍스트 정보 영역 */
        .brand-name { font-size: 15px; letter-spacing: 4px; color: #AAA; margin-bottom: 15px; text-transform: uppercase; }
        .scent-title { font-size: 46px; font-weight: 700; color: #4A5A4D; margin: 0 0 20px 0; }

        .tag-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .tag-item { color: #A0A080; font-size: 15px; font-weight: 400; }

        .description-box {
            font-size: 18px;
            line-height: 1.8;
            color: #666;
            margin-bottom: 50px;
            word-break: keep-all;
            padding: 0 20px;
        }

        .btn-main {
            background: #5B6753;
            color: white;
            padding: 22px 0;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            text-decoration: none;
            display: block;
            margin-bottom: 25px;
        }

        .btn-sub { font-size: 14px; letter-spacing: 2px; color: #BBB; text-decoration: none; display: block; margin-bottom: 30px; }
        .footer-logo { font-size: 12px; letter-spacing: 3px; color: #DDD; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-sub">SHARED FRAGRANCE STRIP</div>
        <div class="top-main">누군가의 향기 시향지가 도착했어요</div>

        <div class="visual-area">
            <div class="axis axis-h"></div>
            <div class="axis axis-v"></div>
            <div class="axis-label label-top">포근함</div>
            <div class="axis-label label-bottom">부드러움</div>
            <div class="axis-label label-left">차분함</div>
            <div class="axis-label label-right">산뜻함</div>

            <div class="scent-blur" style="background: {{ scent_color }};"></div>
        </div>

        <div class="brand-name">{{ eng_name|default:"FRAGMNT" }}</div>
        <h1 class="scent-title">{{ scent_name }}</h1>

        <div class="tag-group">
            {% for tag in tags %}
            <span class="tag-item">#{{ tag }}</span>
            {% endfor %}
        </div>

        <div class="description-box">
            {{ ai_comment }}
        </div>

        <div class="btn-main">FIND MY SCENT</div>
        <div class="btn-sub">EXPLORE FRAGRANCES</div>
        <div class="footer-logo">fragmnt</div>
    </div>
</body>
</html>
