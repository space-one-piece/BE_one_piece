'''
nginx 설정 파일의 흐름? 이라고해야하나

사용자가 /static/css/main.css 요청
→ Nginx가 파일 직접 반환 (Django 안 거침) 사용자가 /api/users/ 요청
→ Nginx가 Django:8000으로 전달
→ Django가 처리 후 응답
→ Nginx가 사용자에게 반환
'''

upstream django {
    server django:8000;
}

server {
    listen 80; #80포트로 들어오는 요청받
    server_name fragmnt.pics www.fragmnt.pics;

    location /static/ {
        alias /one_piece/static/; # docker 볼륨에 연결된 static 경로
    }

    #/media로 시작하는 요청도 바로 파일 서빙 (유저 업로드한 이미지 같은거)
    location /media/ {
        alias /one_piece/media/; #docker volume에 연결된 media 경로
    }

    # 나머지 모든 요청은 django(gunicorn)로 전달
    location / {
        proxy_pass http://django;      # /로 시작하는 모든 url요청을 django 8000포트로 넘겨줌
        proxy_set_header Host $host;      # 사용자가 어떤 도메인으로 접속했는지 Django한테 알려줌
        proxy_set_header X-Real-IP $remote_addr;  #사용자의 실제 ip를 django한테 알려줌
    }
}